<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Financial Planning</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.3;
            z-index: -1;
            animation: float 8s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .link-text {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        .loader-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: load 3s forwards ease-in-out;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 1;
        }
    </style>
    <meta http-equiv="refresh" content="3;url=https://finplan.engineershub.org">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <h1>Looking for the <br><strong>financial planning tool?</strong></h1>
        <a href="https://finplan.engineershub.org" class="link-text">finplan.engineershub.org</a>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

        <a href="https://finplan.engineershub.org" class="btn">Click here if you aren't redirected...</a>
    </div>

    <script>
        // Fallback Javascript redirect
        setTimeout(function(){
            window.location.href = "https://finplan.engineershub.org";
        }, 3500);
    </script>
</body>
</html>
